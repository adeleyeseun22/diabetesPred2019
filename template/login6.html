<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Login</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='log.css') }}">
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css">
		<link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,700,900" rel="stylesheet">
    <!-- Bootstrap CSS
		============================================ -->
    <link rel="stylesheet" href="/static/css/bootstrap.css">
    <!-- Bootstrap CSS
		============================================ -->
    
	</head>

	

	<body>
		<div class="login">
			<section id="hero">
			<div class="hero-container">
				
		
		<a href="{{ url_for('index') }}" class="btn-home">Home</a> 
		 
    </div>
    </section>
			<h1>GlucoDS Physician Login</h1>
			
			<div class="links">
				<a href="{{ url_for('login6') }}" class="active">Login</a>
				<a href="{{ url_for('register') }}">Register</a>
			</div>
			<form action="{{ url_for('login') }}" method="post">
				<label for="username">
					<i class="fas fa-user"></i>
				</label>
				<input type="text" name="username" placeholder="Username" id="username" required>
				<label for="password">
					<i class="fas fa-lock"></i>
				</label>
				<input type="password" name="password" placeholder="Password" id="password" required min="8">
				<div class="msg">{{ msg }}</div>
				<input type="submit" value="Login">
							</form>
		</div>
	</body>
</html>
